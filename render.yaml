services:
  - type: web
    name: tallervisitas-pro
    runtime: node
    plan: starter
    buildCommand: npm run build
    startCommand: npm start
    healthCheckPath: /health
    disk:
      name: tallervisitas-uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: UPLOAD_DIR
        value: /var/data/uploads
      - key: MAX_UPLOAD_MB
        value: 10
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: tallervisitas-db
          property: connectionString
      - key: CORS_ORIGIN
        value: ""

databases:
  - name: tallervisitas-db
    plan: starter
    databaseName: tallervisitas_db
    user: tallervisitas
